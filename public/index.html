<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vulcano AI</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --magma: #ff4500;
    --ember: #ff6a00;
    --lava: #c0392b;
    --obsidian: #0d0d0d;
    --smoke: #2a2a2a;
    --pumice: #3a3a3a;
    --glow: #ff7733;
    --white-hot: #fff5f0;
    --tephra: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--obsidian);
    color: var(--white-hot);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 17px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 110%, rgba(192,57,43,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,69,0,0.12) 0%, transparent 50%),
      radial-gradient(ellipse 40% 30% at 50% 105%, rgba(255,106,0,0.1) 0%, transparent 40%);
    animation: lavaShift 8s ease-in-out infinite alternate;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes lavaShift {
    0% { opacity: 0.7; transform: scaleX(1); }
    100% { opacity: 1; transform: scaleX(1.05); }
  }

  header {
    position: relative;
    z-index: 10;
    padding: 18px 32px;
    border-bottom: 1px solid rgba(255,69,0,0.25);
    background: linear-gradient(180deg, rgba(13,13,13,0.98) 0%, rgba(13,13,13,0.9) 100%);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
  }

  /* Logo placeholder — nahraď <img> tagem až budeš mít logo */
  .logo-area {
    width: 40px;
    height: 40px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-area img {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .header-text { flex: 1; }

  h1 {
    font-family: 'Cinzel', serif;
    font-weight: 900;
    font-size: 1.6rem;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, #ff7733 0%, #ff4500 40%, #ffaa44 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .tagline {
    font-size: 0.78rem;
    color: var(--tephra);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-family: 'Cinzel', serif;
    font-weight: 400;
    margin-top: 3px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--magma);
    box-shadow: 0 0 8px var(--magma);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--magma); }
    50% { opacity: 0.5; box-shadow: 0 0 3px var(--magma); }
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px;
    position: relative;
    z-index: 5;
    scroll-behavior: smooth;
  }

  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: rgba(255,69,0,0.3); border-radius: 2px; }

  .message {
    display: flex;
    gap: 14px;
    margin-bottom: 22px;
    animation: fadeUp 0.35s ease-out;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { flex-direction: row-reverse; }

  .avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 13px;
  }

  .avatar.ai {
    background: linear-gradient(135deg, var(--lava), var(--magma));
    box-shadow: 0 0 12px rgba(255,69,0,0.4);
    color: white;
    overflow: hidden;
  }

  /* Pokud je logo, zobrazí se v AI avataru */
  .avatar.ai img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  .avatar.user {
    background: var(--smoke);
    border: 1px solid var(--pumice);
    color: var(--tephra);
  }

  .bubble {
    padding: 13px 18px;
    border-radius: 16px;
    line-height: 1.65;
    max-width: calc(100% - 55px);
    font-size: 16px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .message.ai .bubble {
    background: rgba(30,20,15,0.85);
    border: 1px solid rgba(255,69,0,0.2);
    border-radius: 4px 16px 16px 16px;
    color: var(--white-hot);
  }

  .message.user .bubble {
    background: linear-gradient(135deg, rgba(192,57,43,0.35), rgba(255,69,0,0.2));
    border: 1px solid rgba(255,69,0,0.3);
    border-radius: 16px 4px 16px 16px;
    color: #ffe8e0;
  }

  .welcome {
    text-align: center;
    padding: 40px 20px;
    max-width: 500px;
    margin: 0 auto;
    animation: fadeUp 0.6s ease-out;
  }

  .welcome-volcano {
    font-size: 52px;
    margin-bottom: 16px;
    filter: drop-shadow(0 0 16px rgba(255,69,0,0.5));
    animation: volcanoGlow 3s ease-in-out infinite;
  }

  @keyframes volcanoGlow {
    0%, 100% { filter: drop-shadow(0 0 16px rgba(255,69,0,0.5)); }
    50% { filter: drop-shadow(0 0 28px rgba(255,69,0,0.8)); }
  }

  .welcome h2 {
    font-family: 'Cinzel', serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--glow);
    margin-bottom: 10px;
    letter-spacing: 0.08em;
  }

  .welcome p {
    color: var(--tephra);
    font-size: 15px;
    line-height: 1.6;
    font-style: italic;
  }

  .typing-indicator {
    display: flex;
    gap: 14px;
    margin-bottom: 22px;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
    animation: fadeUp 0.3s ease-out;
  }

  .typing-dots {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
    background: rgba(30,20,15,0.85);
    border: 1px solid rgba(255,69,0,0.2);
    border-radius: 4px 16px 16px 16px;
  }

  .typing-dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--magma);
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .input-area {
    position: relative;
    z-index: 10;
    padding: 16px 24px 20px;
    border-top: 1px solid rgba(255,69,0,0.15);
    background: linear-gradient(0deg, rgba(13,13,13,1) 0%, rgba(13,13,13,0.95) 100%);
    flex-shrink: 0;
  }

  .input-wrap {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,69,0,0.25);
    border-radius: 12px;
    padding: 13px 16px;
    color: var(--white-hot);
    font-family: 'Crimson Pro', Georgia, serif;
    font-size: 16px;
    resize: none;
    outline: none;
    min-height: 48px;
    max-height: 140px;
    line-height: 1.5;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  textarea:focus {
    border-color: rgba(255,69,0,0.6);
    box-shadow: 0 0 16px rgba(255,69,0,0.1);
  }

  textarea::placeholder { color: #555; font-style: italic; }

  button#send {
    background: linear-gradient(135deg, var(--lava) 0%, var(--magma) 100%);
    border: none;
    border-radius: 12px;
    width: 48px; height: 48px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 0 12px rgba(255,69,0,0.3);
  }

  button#send:hover { transform: scale(1.06); box-shadow: 0 0 20px rgba(255,69,0,0.5); }
  button#send:active { transform: scale(0.96); }
  button#send:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  button#send svg { width: 20px; height: 20px; fill: white; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: #3a3a3a;
    margin-top: 8px;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
    letter-spacing: 0.05em;
  }

  .error-bubble {
    background: rgba(192,57,43,0.15) !important;
    border-color: rgba(192,57,43,0.4) !important;
    color: #ffaaaa !important;
    font-style: italic;
  }

  .lava-crack {
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,69,0,0.5) 30%, rgba(255,106,0,0.8) 50%, rgba(255,69,0,0.5) 70%, transparent);
    margin: 0 0 12px;
    max-width: 800px;
    margin-left: auto;
    margin-right: auto;
  }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <!-- Logo: az budes mit soubor, nahrad tuto SVG za: <img src="logo.png" alt="Vulcano AI"> -->
    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M20 4 L28 16 L36 32 H4 L12 16 Z" fill="url(#vg1)" opacity="0.9"/>
      <path d="M17 4 C17 4 15 8 18 10 C21 12 19 6 21 4" fill="#ff6a00" opacity="0.7"/>
      <path d="M20 2 C20 2 18 6 20 8 C22 10 21 4 23 2" fill="#ffaa44" opacity="0.8"/>
      <ellipse cx="20" cy="32" rx="16" ry="3" fill="url(#vg2)" opacity="0.5"/>
      <defs>
        <linearGradient id="vg1" x1="20" y1="4" x2="20" y2="32" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#1a1a1a"/>
          <stop offset="60%" stop-color="#2a1a10"/>
          <stop offset="100%" stop-color="#3a1a08"/>
        </linearGradient>
        <linearGradient id="vg2" x1="4" y1="32" x2="36" y2="32" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="transparent"/>
          <stop offset="50%" stop-color="#ff4500"/>
          <stop offset="100%" stop-color="transparent"/>
        </linearGradient>
      </defs>
    </svg>
  </div>
  <div class="header-text">
    <h1>VULCANO AI</h1>
    <div class="tagline">Inteligence z hlubin</div>
  </div>
  <div class="status-dot"></div>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-volcano">🌋</div>
    <h2>Vítej, odvážný cestovateli</h2>
    <p>Vulcano AI je připravena. Každá otázka je jako kámen vhozený do lávového jezera — odpověď přijde z hlubin.</p>
  </div>
</div>

<div class="input-area">
  <div class="lava-crack"></div>
  <div class="input-wrap">
    <textarea id="userInput" placeholder="Napiš svou otázku do lávového jezera…" rows="1"></textarea>
    <button id="send">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
      </svg>
    </button>
  </div>
  <div class="footer-note">Powered by Groq · Llama 3.3 · Vulcano AI</div>
</div>

<script>
  const chat = document.getElementById('chat');
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('send');
  const welcome = document.getElementById('welcome');

  let history = [];

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 140) + 'px';
  });

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function addMessage(role, text, isError = false) {
    if (welcome) welcome.style.display = 'none';

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    // Avatar pro AI: pokud mas logo, vloz sem <img src="logo.png">
    avatar.textContent = role === 'ai' ? 'V' : 'Ty';

    const bubble = document.createElement('div');
    bubble.className = 'bubble' + (isError ? ' error-bubble' : '');
    bubble.textContent = text;

    div.appendChild(avatar);
    div.appendChild(bubble);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing-indicator';
    div.id = 'typing';

    const avatar = document.createElement('div');
    avatar.className = 'avatar ai';
    avatar.textContent = 'V';

    const dots = document.createElement('div');
    dots.className = 'typing-dots';
    dots.innerHTML = '<span></span><span></span><span></span>';

    div.appendChild(avatar);
    div.appendChild(dots);
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    addMessage('user', text);
    history.push({ role: 'user', parts: [{ text }] });
    showTyping();

    try {
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ history })
      });

      const data = await response.json();
      removeTyping();

      if (data.error) {
        addMessage('ai', `⚠️ ${data.error}`, true);
        history.pop();
      } else {
        history.push({ role: 'model', parts: [{ text: data.reply }] });
        addMessage('ai', data.reply);
      }

    } catch (err) {
      removeTyping();
      addMessage('ai', `⚠️ Spojení selhalo: ${err.message}`, true);
      history.pop();
    }

    sendBtn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
